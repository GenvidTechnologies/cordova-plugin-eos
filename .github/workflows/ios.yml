name: iOS

# Two tiers:
#   smoke      - compile/link the demo app with the plugin for the SIMULATOR on
#                every PR and push to main.
#   distribute - DEFERRED (if: false). Would build a Development-signed .ipa for
#                ad-hoc sideloading. See the TODO on the distribute job below.
#
# EOS-SPECIFIC DEVIATION from the cordova-plugin-marketplace template: this plugin
# depends on the EOS SDK binary, which is NOT in git — it is downloaded from Azure
# blob storage at build time and copied into src/ios/ by the before_plugin_install
# hook. So even the smoke tier needs OP_SERVICE_ACCOUNT_TOKEN to read the Azure
# storage connection string and the EOS app config from 1Password (Project-Burbank).
# A secret-free smoke tier is not possible for this plugin.

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

env:
  # The EOS SDK is unzipped here by `npm run install-sdk:ios:posix`; the
  # before_plugin_install hook copies EOSSDK.framework from EOS_SDK_PATH into
  # src/ios/ during `cordova platform add ios`, so it must be set before that step.
  EOS_SDK_PATH: ${{ github.workspace }}/eos-sdk/ios/SDK

jobs:
  smoke:
    name: Smoke build (simulator)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-15
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      # latest-stable always has a matching simulator runtime installed; pinning a
      # specific Xcode can select an SDK whose runtime isn't on the image and fails
      # asset-catalog compilation with "No simulator runtime version available".
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install 1Password CLI
        uses: 1Password/install-cli-action@v1
      - name: Version lockstep guard
        run: npm run version-guard
      - run: npm ci
      - name: Pack plugin + tests
        run: npm run package
      - name: Load Azure storage connection string from 1Password
        uses: 1Password/load-secrets-action@v2
        with:
          export-env: true
        env:
          AZURE_STORAGE_CONNECTION_STRING: op://Project-Burbank/Burbank Build Watcher Storage Account/connection string
      - name: Download + unzip EOS SDK (iOS)
        run: npm run install-sdk:ios:posix
      - name: Set up demo project (no signing config)
        run: npm run setup:demo:sim
      - name: Inject EOS app config (eos_config.json)
        run: npm run setup:demo:config:eos
      - name: Add iOS platform (copies EOSSDK.framework via EOS_SDK_PATH)
        run: npm run setup:demo:sim:ios
      - name: Build demo for simulator (compile/link smoke)
        run: npm run build:demo:ios:sim

  distribute:
    name: Signed .ipa (sideload artifact)
    # TODO(DEFERRED): no Development provisioning profile exists for the demo's
    # bundle id (com.genvidtech.eosdemo). The vault's "iOS Development Profile"
    # is for com.genvid.burbank, not the demo. Before enabling this job:
    #   1. Create a Development provisioning profile for com.genvidtech.eosdemo
    #      (with registered tester device UDIDs) in the Apple Developer portal.
    #   2. Store it in the Project-Burbank vault as a DOCUMENT item named
    #      "Cordova EOS Demo iOS Profile" (referenced below).
    #   3. Replace `if: false` with:
    #      github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    # Verify the .p12 in "AppStore Development Certificate" includes the PRIVATE
    # key (imports as "1 identity", not "1 certificate"), or xcodebuild fails with
    # "No signing certificate ... with a private key was found".
    if: false
    runs-on: macos-15
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install 1Password CLI
        uses: 1Password/install-cli-action@v1
      - name: Version lockstep guard
        run: npm run version-guard
      - run: npm ci
      - name: Pack plugin + tests
        run: npm run package
      - name: Load signing coordinates from 1Password
        uses: 1Password/load-secrets-action@v2
        with:
          export-env: true
        env:
          AZURE_STORAGE_CONNECTION_STRING: op://Project-Burbank/Burbank Build Watcher Storage Account/connection string
          APPLE_DEVELOPMENT_TEAM: op://Project-Burbank/Apple Distribution Certificate/team_id
          DEVELOPMENT_CERTIFICATE_ID: op://Project-Burbank/AppStore Development Certificate/id
          DEVELOPMENT_CERTIFICATE_PASSWORD: op://Project-Burbank/AppStore Development Certificate/password
          DEVELOPER_AUTHORITY_ID: op://Project-Burbank/Developer ID Certification Authority/id
          PROFILE_FILENAME: op://Project-Burbank/Cordova EOS Demo iOS Profile/filename
      - name: Fetch cert + profile files
        run: |
          set -euo pipefail
          op read "op://Project-Burbank/AppStore Development Certificate/${DEVELOPMENT_CERTIFICATE_ID}.p12" -o "$RUNNER_TEMP/dev.p12"
          # Provisioning profile for the demo's bundle id (com.genvidtech.eosdemo).
          op read "op://Project-Burbank/Cordova EOS Demo iOS Profile/${PROFILE_FILENAME}" -o "$RUNNER_TEMP/profile.mobileprovision"
          # Intermediate CA: GitHub runners already carry Apple's WWDR cert, so this
          # is best-effort and must not fail the build if the item has no .cer.
          op read "op://Project-Burbank/Developer ID Certification Authority/${DEVELOPER_AUTHORITY_ID}.cer" -o "$RUNNER_TEMP/authority.cer" || echo "authority cert not fetched (optional)"
      - name: Download + unzip EOS SDK (iOS)
        run: npm run install-sdk:ios:posix
      - name: Import signing cert into a temporary keychain
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/ios-build.keychain-db"
          KP="tempPassword"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/["]//g')
          [ -f "$RUNNER_TEMP/authority.cer" ] && security import "$RUNNER_TEMP/authority.cer" -k "$KEYCHAIN" -T /usr/bin/codesign -t cert || true
          security import "$RUNNER_TEMP/dev.p12" -k "$KEYCHAIN" -P "$DEVELOPMENT_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -t agg
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN"
      - name: Install provisioning profile and capture its UUID
        run: |
          set -euo pipefail
          PROFILES="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES"
          cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILES/"
          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" -o "$RUNNER_TEMP/profile.plist"
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile.plist")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile.plist")
          echo "PP_UUID=$PP_UUID" >> "$GITHUB_ENV"
          echo "Provisioning profile: $PP_NAME ($PP_UUID)"
      - name: Set up demo project + iOS platform
        run: |
          npm run setup:demo:sim
          npm run setup:demo:config:eos
          npm run setup:demo:sim:ios
      - name: Write manual-signing build.json
        run: |
          cat > demo/build.json <<JSON
          {
            "ios": {
              "release": {
                "codeSignIdentity": "Apple Development",
                "developmentTeam": "${APPLE_DEVELOPMENT_TEAM}",
                "provisioningProfile": "${PP_UUID}",
                "packageType": "development",
                "automaticProvisioning": false
              }
            }
          }
          JSON
          echo "--- demo/build.json ---"; cat demo/build.json
      - name: Build Development-signed .ipa
        working-directory: demo
        run: npx --prefix . cordova build ios --device --release
      - name: Locate the produced .ipa
        run: |
          set -euo pipefail
          IPA=$(find demo/platforms/ios -name '*.ipa' -print -quit)
          if [ -z "$IPA" ]; then
            echo "No .ipa produced; listing build output for diagnosis:"; find demo/platforms/ios/build -maxdepth 3 -print
            exit 1
          fi
          echo "IPA_PATH=$IPA" >> "$GITHUB_ENV"
          echo "Found IPA: $IPA"
      - name: Compute artifact label (ref_name may contain '/')
        id: meta
        run: echo "label=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: eos-ios-${{ steps.meta.outputs.label }}
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error
          retention-days: 30
