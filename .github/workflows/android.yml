name: Android

# Two tiers:
#   smoke      - compile/link the demo app with the plugin on every PR and push to
#                main. No emulator (we run no on-device tests, so booting one would
#                add flakiness for zero signal).
#   distribute - on-demand (workflow_dispatch) or on a vX.Y.Z tag, build a SIGNED
#                release APK using the signing keystore from 1Password and upload
#                it as a downloadable artifact for sideloading (adb install).
#
# EOS-SPECIFIC DEVIATION from the cordova-plugin-marketplace template: this plugin
# depends on the EOS SDK binary, which is NOT in git — it is downloaded from Azure
# blob storage at build time. So BOTH tiers (smoke included) need the single secret
# OP_SERVICE_ACCOUNT_TOKEN to (a) read the Azure storage connection string and the
# EOS app config from 1Password (vault Project-Burbank) and (b) sign in the
# distribute tier. A secret-free smoke tier is not possible for this plugin.

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  # The EOS SDK is unzipped here by `npm run install-sdk:android:posix`; the native
  # build (src/android/build.gradle) resolves the AAR via EOS_SDK_PATH.
  EOS_SDK_PATH: ${{ github.workspace }}/eos-sdk/android/SDK

jobs:
  smoke:
    name: Smoke build (compile/link)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install 1Password CLI
        uses: 1Password/install-cli-action@v1
      - name: Version lockstep guard
        run: npm run version-guard
      - run: npm ci
      - name: Pack plugin + tests
        run: npm run package
      - name: Load Azure storage connection string from 1Password
        uses: 1Password/load-secrets-action@v2
        with:
          export-env: true
        env:
          # az auto-reads AZURE_STORAGE_CONNECTION_STRING, so the existing
          # install-sdk script's --account-name is satisfied without `az login`.
          AZURE_STORAGE_CONNECTION_STRING: op://Project-Burbank/Burbank Build Watcher Storage Account/connection string
      - name: Download + unzip EOS SDK (Android)
        run: npm run install-sdk:android:posix
      - name: Set up demo project (no signing config)
        run: npm run setup:demo:sim
      - name: Inject EOS app config (eos_config.json)
        run: npm run setup:demo:config:eos
      - name: Add Android platform
        run: npm run setup:demo:android
      - name: Build demo (debug, compile/link smoke)
        run: npm run build:demo:android

  distribute:
    name: Signed APK (sideload artifact)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install 1Password CLI
        uses: 1Password/install-cli-action@v1
      - name: Version lockstep guard
        run: npm run version-guard
      - run: npm ci
      - name: Pack plugin + tests
        run: npm run package
      - name: Load secrets from 1Password (Azure + keystore coordinates)
        uses: 1Password/load-secrets-action@v2
        with:
          export-env: true
        env:
          AZURE_STORAGE_CONNECTION_STRING: op://Project-Burbank/Burbank Build Watcher Storage Account/connection string
          KEYSTORE_ALIAS: op://Project-Burbank/Burbank App Signing Keystore/alias
          KEYSTORE_PASSWORD: op://Project-Burbank/Burbank App Signing Keystore/password
          KEYSTORE_FILENAME: op://Project-Burbank/Burbank App Signing Keystore/filename
      - name: Fetch keystore file (dynamic filename)
        run: op read "op://Project-Burbank/Burbank App Signing Keystore/${KEYSTORE_FILENAME}" -o "$RUNNER_TEMP/release.keystore"
      - name: Download + unzip EOS SDK (Android)
        run: npm run install-sdk:android:posix
      - name: Set up demo project
        run: npm run setup:demo:sim
      - name: Inject EOS app config (eos_config.json)
        run: npm run setup:demo:config:eos
      - name: Add Android platform
        run: npm run setup:demo:android
      - name: Build signed release APK (sideloadable, not AAB)
        working-directory: demo
        run: >
          npx --prefix . cordova build android --release --
          --keystore="$RUNNER_TEMP/release.keystore"
          --storePassword="$KEYSTORE_PASSWORD"
          --alias="$KEYSTORE_ALIAS"
          --password="$KEYSTORE_PASSWORD"
          --packageType=apk
      - name: Compute artifact label (ref_name may contain '/')
        id: meta
        run: echo "label=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eos-android-${{ steps.meta.outputs.label }}
          path: demo/platforms/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
